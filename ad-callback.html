<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ad Verification Callback</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: Arial, sans-serif;
        }
        
        .container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 400px;
        }
        
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        h1 {
            color: #333;
            margin: 20px 0;
        }
        
        p {
            color: #666;
            margin: 10px 0;
        }
        
        .success {
            color: #28a745;
            font-weight: bold;
        }
        
        .error {
            color: #dc3545;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner"></div>
        <h1 id="status">Processing...</h1>
        <p id="message">Please wait while we verify your completion.</p>
    </div>

    <script>
        // Anti-bypass detection
        function detectBypass() {
            const bypassDomains = [
                'izen.lol',
                'rtaoexe.xyz/bypass',
                'bypass.tools',
                'bypass.links',
                'bypass.city',
                'bypass.vip'
            ];
            
            // Check if running in iframe
            if (window.self !== window.top) {
                return true;
            }
            
            // Check for Discord bot
            if (navigator.userAgent.includes('Discord')) {
                return true;
            }
            
            // Check for bots
            const botPatterns = [/bot/i, /crawler/i, /spider/i, /scraper/i, /curl/i, /wget/i, /python/i];
            for (let pattern of botPatterns) {
                if (pattern.test(navigator.userAgent)) {
                    return true;
                }
            }
            
            // Check for userscript managers
            if (window.GM_getValue || window.GM_setValue || window.$$ || window.unsafeWindow) {
                return true;
            }
            
            return false;
        }
        
        // Check for bypass
        if (detectBypass()) {
            document.querySelector('#status').textContent = '❌ Access Denied';
            document.querySelector('#status').className = 'error';
            document.querySelector('#message').textContent = 'Suspicious activity detected.';
            document.querySelector('.spinner').style.display = 'none';
            
            setTimeout(() => {
                window.close();
            }, 3000);
        } else {
            // Get the verification token from URL parameter
            const urlParams = new URLSearchParams(window.location.search);
            const verificationToken = urlParams.get('ref');
            const parentWindow = window.opener;
            
            if (verificationToken && parentWindow) {
                try {
                    // Store completion flag
                    localStorage.setItem('adCompleted', 'true');
                    localStorage.setItem('adVerificationToken', verificationToken);
                    
                    // Send message to parent window
                    parentWindow.postMessage({
                        type: 'AD_COMPLETED',
                        token: verificationToken,
                        timestamp: Date.now()
                    }, '*');
                    
                    // Show success
                    document.querySelector('#status').textContent = '✓ Verified!';
                    document.querySelector('#status').className = 'success';
                    document.querySelector('#message').textContent = 'Redirecting you back...';
                    
                    // Wait 2 seconds then close and redirect
                    setTimeout(() => {
                        if (parentWindow) {
                            parentWindow.location.href = window.location.origin + window.location.pathname.replace('ad-callback.html', 'index.html');
                        }
                        window.close();
                    }, 2000);
                    
                } catch (e) {
                    console.error('Error:', e);
                    document.querySelector('#status').textContent = '⚠️ Processing';
                    document.querySelector('#message').textContent = 'Finalizing your reward...';
                    
                    setTimeout(() => {
                        window.close();
                    }, 2000);
                }
            } else {
                document.querySelector('#status').textContent = '❌ Invalid Token';
                document.querySelector('#status').className = 'error';
                document.querySelector('#message').textContent = 'Verification failed.';
                document.querySelector('.spinner').style.display = 'none';
                
                setTimeout(() => {
                    window.close();
                }, 3000);
            }
        }
    </script>
</body>
</html>
