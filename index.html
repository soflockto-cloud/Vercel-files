<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ad Link Reward - Get Your Random Key</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Complete the Ad Link to Get Your Random Key</h1>
        <p class="description">Click the link below to complete the ad, and you'll receive a unique randomly generated key! Valid for 24 hours.</p>
        
        <div class="ad-section">
            <a href="#" id="adLink" class="ad-button" target="_blank">Complete Ad Link</a>
            <p id="status" class="status"></p>
        </div>
        
        <div id="keyDisplay" class="key-display hidden">
            <h2>Your Generated Key:</h2>
            <div id="generatedKey" class="key-box"></div>
            <p id="timerDisplay" class="timer-display"></p>
            <button id="copyBtn" class="copy-btn">Copy to Clipboard</button>
            <button id="newKeyBtn" class="new-key-btn">Generate New Key</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
