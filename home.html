<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome - Key Generator & Joke App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 50px 40px;
            max-width: 600px;
            width: 100%;
            text-align: center;
        }

        h1 {
            color: #333;
            margin-bottom: 15px;
            font-size: 32px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 40px;
            font-size: 16px;
            line-height: 1.6;
        }

        .features-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .feature-card {
            background: #f8f9fa;
            border: 2px solid #e9ecef;
            border-radius: 12px;
            padding: 30px 20px;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .feature-card:hover {
            border-color: #667eea;
            background: #f0f7ff;
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.2);
        }

        .feature-icon {
            font-size: 40px;
            margin-bottom: 15px;
        }

        .feature-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 8px;
            color: #333;
        }

        .feature-desc {
            font-size: 13px;
            color: #666;
            line-height: 1.4;
        }

        .divider {
            height: 1px;
            background: #e9ecef;
            margin: 30px 0;
        }

        .info-box {
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            padding: 15px;
            border-radius: 6px;
            text-align: left;
            color: #856404;
            font-size: 14px;
        }

        @media (max-width: 600px) {
            .container {
                padding: 30px 20px;
            }

            h1 {
                font-size: 26px;
            }

            .features-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎯 Welcome!</h1>
        <p class="subtitle">Choose what you'd like to do:</p>

        <div class="features-grid">
            <a href="index.html" class="feature-card">
                <div class="feature-icon">🔑</div>
                <div class="feature-title">Key Generator</div>
                <div class="feature-desc">Complete ads to get random keys</div>
            </a>

            <a href="joke.html" class="feature-card">
                <div class="feature-icon">😂</div>
                <div class="feature-title">Joke Generator</div>
                <div class="feature-desc">Get random jokes instantly</div>
            </a>
        </div>

        <div class="divider"></div>

        <div class="info-box">
            <strong>ℹ️ How it works:</strong> Click any feature above to get started. Keys are valid for 24 hours and can be renewed anytime!
        </div>
    </div>
</body>
</html>
